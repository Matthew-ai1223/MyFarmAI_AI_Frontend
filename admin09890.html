<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriConnect | Admin Dashboard</title>
    <meta name="description" content="Admin view for all AI platform conversations.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --bg-main: #0b110e;
            --bg-secondary: #131d18;
            --bg-panel: rgba(19, 29, 24, 0.7);
            --border-subtle: rgba(255, 255, 255, 0.08);
            --border-highlight: rgba(16, 185, 129, 0.2);
            --text-primary: #f0fdf4;
            --text-secondary: #9ca3af;
            --accent-glow: #10b981;
            --accent-glow-subtle: rgba(16, 185, 129, 0.15);
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: 300px;
            background-color: var(--bg-secondary);
            border-right: 1px solid var(--border-subtle);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .sidebar-header {
            padding: 2rem;
            border-bottom: 1px solid var(--border-subtle);
        }

        .sidebar-header h2 {
            font-family: 'Outfit', sans-serif;
            margin: 0;
            color: var(--accent-glow);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .user-item {
            padding: 1.2rem 2rem;
            cursor: pointer;
            border-bottom: 1px solid var(--border-subtle);
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .user-item:hover,
        .user-item.active {
            background: var(--bg-panel);
            border-left: 4px solid var(--accent-glow);
        }

        .user-item .email {
            font-weight: 600;
            font-size: 0.95rem;
        }

        .user-item .stats {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: radial-gradient(circle at top right, rgba(16, 185, 129, 0.05) 0%, transparent 40%);
            position: relative;
        }

        .header {
            padding: 1.5rem 3rem;
            border-bottom: 1px solid var(--border-subtle);
            background: var(--bg-panel);
            backdrop-filter: blur(12px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .header h1 {
            margin: 0;
            font-family: 'Outfit', sans-serif;
            font-size: 1.5rem;
        }

        .chat-container {
            flex: 1;
            padding: 2rem 3rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .message {
            max-width: 80%;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .message.user {
            align-self: flex-end;
            align-items: flex-end;
        }

        .message.assistant {
            align-self: flex-start;
            align-items: flex-start;
        }

        .bubble {
            padding: 1rem 1.5rem;
            border-radius: 12px;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .message.user .bubble {
            background: var(--bg-secondary);
            border: 1px solid var(--border-subtle);
            border-top-right-radius: 0;
        }

        .message.assistant .bubble {
            background: var(--accent-glow-subtle);
            border: 1px solid var(--border-highlight);
            border-top-left-radius: 0;
            color: #d1fae5;
        }

        .meta {
            font-size: 0.75rem;
            color: var(--text-secondary);
            display: flex;
            gap: 10px;
        }

        .loading-screen {
            position: absolute;
            inset: 0;
            background: var(--bg-main);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            color: var(--accent-glow);
            font-size: 2rem;
            flex-direction: column;
            gap: 1rem;
        }

        .hidden {
            display: none !important;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-secondary);
            font-size: 1.2rem;
            gap: 1rem;
            margin: auto;
        }

        .empty-state i {
            font-size: 4rem;
            color: var(--border-subtle);
        }

        /* custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-subtle);
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <div id="loader" class="loading-screen">
        <i class="ph ph-spinner-gap ph-spin"></i>
        <div style="font-size:1rem; color: #9ca3af; font-family:'Outfit'">Loading Platform Data...</div>
    </div>

    <aside class="sidebar">
        <div class="sidebar-header">
            <h2><i class="ph-fill ph-plant"></i> Admin Logs</h2>
            <div style="font-size: 0.8rem; color:#9ca3af; margin-top:5px;">System Conversational History</div>
        </div>
        <ul class="user-list" id="user-list">
            <!-- Injected via JS -->
        </ul>
    </aside>

    <main class="main-content">
        <header class="header">
            <h1 id="active-user-title">Overview</h1>
            <div style="font-size:0.85rem; color:#9ca3af;" id="active-user-stats">Select a user to view</div>
        </header>

        <div class="chat-container" id="chat">
            <div class="empty-state">
                <i class="ph-fill ph-users"></i>
                <div id="empty-msg">Select a user from the sidebar to view their history.</div>
            </div>
        </div>
    </main>

    <script>
        // Use same domain logic as the main app
        const API_BASE = 'https://farm-ai-iota.vercel.app/api';

        let adminData = {};

        async function initAdmin() {
            const loader = document.getElementById('loader');
            try {
                // Fetch the newly created backend admin endpoint
                const res = await fetch(`${API_BASE}/admin/all`);
                const data = await res.json();

                if (data.users && Object.keys(data.users).length > 0) {
                    adminData = data.users;
                    renderSidebar();
                } else {
                    document.getElementById('user-list').innerHTML = '<div style="padding: 2rem; color:#9ca3af; text-align:center;">No history found in database.</div>';
                    document.getElementById('empty-msg').innerText = "Awaiting user interactions...";
                }
            } catch (err) {
                console.error(err);
                alert("Failed to load admin data. Is the backend running?");
            } finally {
                loader.classList.add('hidden');
            }
        }

        function renderSidebar() {
            const list = document.getElementById('user-list');
            list.innerHTML = '';

            // Loop through each email grouping returned
            Object.keys(adminData).forEach((email, index) => {
                const li = document.createElement('li');
                li.className = 'user-item';
                li.innerHTML = `
                    <div class="email"><i class="ph ph-envelope-simple"></i> ${email}</div>
                    <div class="stats">${adminData[email].length} messages logged</div>
                `;
                li.onclick = () => {
                    document.querySelectorAll('.user-item').forEach(el => el.classList.remove('active'));
                    li.classList.add('active');
                    renderChat(email);
                };
                list.appendChild(li);

                // Select first user by default if available
                if (index === 0) li.click();
            });
        }

        function renderChat(email) {
            // Update Headers
            document.getElementById('active-user-title').innerHTML = `<i class="ph ph-user"></i> ${email}`;
            document.getElementById('active-user-stats').innerText = `Total mapped interactions: ${adminData[email].length}`;

            const chat = document.getElementById('chat');
            chat.innerHTML = '';

            const logs = adminData[email];

            if (!logs || logs.length === 0) {
                chat.innerHTML = '<div class="empty-state">No messages tracked.</div>';
                return;
            }

            // Loop through chronological role statements
            logs.forEach(msg => {
                const mDiv = document.createElement('div');
                mDiv.className = `message ${msg.role}`;

                // Simple parsing to handle basic newlines and exact strings
                let htmlContent = msg.content
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;")
                    .replace(/\n\n/g, '<br><br>')
                    .replace(/\n/g, '<br>');

                // Attempt to parse Markdown bold strings dynamically
                htmlContent = htmlContent.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');

                const time = msg.timestamp ? new Date(msg.timestamp).toLocaleString() : 'System Timestamp';

                mDiv.innerHTML = `
                    <div class="bubble">${htmlContent}</div>
                    <div class="meta">
                        <span>${msg.role === 'user' ? 'User Query' : 'AI Engine Response'}</span> &bull; <span>${time}</span>
                    </div>
                `;
                chat.appendChild(mDiv);
            });

            // Auto scroll down to newest history entry
            setTimeout(() => {
                chat.scrollTo({ top: chat.scrollHeight, behavior: 'smooth' });
            }, 50);
        }

        // Initialize Call
        initAdmin();
    </script>
</body>

</html>
